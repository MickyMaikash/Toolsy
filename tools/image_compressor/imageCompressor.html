<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolsy - Image Compressor</title>
    <link rel="StyleSheet" href="./imageCompressor.css">
    <link rel="StyleSheet" href="../../sharedFiles/global.css">
</head>
<body>
     <header></header>
    <section data-title="Image Compressor" data-description="Compress jpg , jpeg and webp Images Without Losing Quality" class="hero"></section>

  <!-- upload section-->
    <section class="UploadSection">
        <img class="upload-icon" src="../../assets/image.svg">
        <h3>Upload your Image</h3>
        <p>Click or Drag and drop your image here</p>
        <input style="display: none;" type="file" accept="image/*" id="ImageInput">
    </section>


  <main class="hidden ScreenAfterSelection">

    <div class=" hidden beforAfterPreview">
        <button id="beforCompression">Before Compression</button>
        <button id="afterCompression">After Compression</button>
    </div>
 <!--preview Section-->
    <section class="imagePreviewSection">
        <img width="400px" class="previewImae">
        <div>
                 <button class="ChangeImage">Change Image</button>
    <div class=" SizeInputContainer">
        <div style="font-size: 23px;font-style: bold;">Enter Required Size in Kb:</div>
        <input type="number" min="0" id="sizeInput">
    </div> 
        </div>
     
    
    </section>
        <div class="conatiner">

              <!--info Screen-->
        <section class="infoSection">
            <div class="name"></div>
            <div class="type"></div>
            <div class="size"></div>
        </section>
    <!--Resize Button-->
        <section class="resultPreview">
            <button id="ImageExtCHangeBtn">Compress Image </button>
            <div class="hidden progressScreen">
                <p class="textHeading">Please Wait While We Compress Your Image</p>
                <progress></progress>
            </div>
        </section>
    <!--Button-->

    <section class="hidden lastSection">
        <p class="text">Image Compressed Successfully</p>
        <button id="DownloadBtn">Download</button>

    </section>
        </div>
  
     

    </main>

    <div class="hidden" id="page-content"></div>
    

    <footer></footer>
    

    <script src="../../sharedFiles/header.js"></script>
    <script src="../../sharedFiles/hero.js"></script>
    <script src="../../sharedFiles/about.js"></script>
    <script src="../../sharedFiles/footer.js"></script>
    <script src="../../sharedFiles/global.js"></script>
    <script src="./imageCompressor.js"></script>
</body>
</html>
